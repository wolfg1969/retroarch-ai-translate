# ============================================================
# Game Configuration Templates for RetroArch AI Translate
# Place in: ./games/<game_id>.yaml
# ============================================================

# ── Example 1: Phoenix Wright (逆转裁判) ────────────────────────
# Save as: ./games/gyakuten.yaml
# RetroArch URL: http://localhost:4404/?game=gyakuten&scene=courtroom

# ── Example 2: Fire Emblem (火焰纹章) ───────────────────────────
# Save as: ./games/fire_emblem.yaml
# RetroArch URL: http://localhost:4404/?game=fire_emblem

# ── Example 3: Zelda: Minish Cap (塞尔达缩小帽) ─────────────────
# Save as: ./games/zelda_minish.yaml
# RetroArch URL: http://localhost:4404/?game=zelda_minish

# ============================================================

# ── Phoenix Wright: Ace Attorney (逆转裁判) ─────────────────────

---
game_id: gyakuten
display_name: 逆转裁判
language: jpn
default_scene: courtroom

# Optional OCR context. Keep values as single-line strings for Decky compatibility.
# These hints guide text recognition only; they do not crop the screenshot.
ocr:
  ui_style: "GBA 法庭文字冒险界面，人物立绘通常位于画面中央或两侧。"
  dialogue_style: "深色对话框配白色像素日文，角色名与对话正文分开显示。"
  dialogue_location: "主要对话通常位于画面下方约三分之一，角色名在对话框左上方。"
  characters: "成歩堂龍一、綾里真宵、御劍怜侍、裁判長、星影龍"
  ignore_regions: "忽略纯装饰背景、无文字的人物立绘和对话框边框。"

# Overlay display style
overlay:
  font:
    size: 0                # 字号 (px), 0=自动缩放 (视口高度/10, 最小10px, 自适应各种分辨率)
  speaker:
    left_align: true       # True: 左对齐, False: 居中
    color: "#ffc800"       # 角色名颜色 (hex: #rgb 或 #rrggbb)
  dialogue:
    left_align: true       # True: 左对齐 (默认), False: 居中

# Fixed translations — never let the model rewrite these
signature_phrases:
  異議あり！: 反对！
  待った！: 等等！
  くらえ！: 接招！
  矛盾している！: 这里有矛盾！
  これで終わりだ！: 到此为止！
  証拠品を提示する: 出示证物
  尋問: 询问
  証言: 证言

# Character tone rules — model adjusts Chinese style per speaker
character_tones:
  成歩堂: "口语化，语气词多（吧、啊、呢），偶尔吐槽，紧急时句子短促、感叹号收尾，自称'我'"
  御劍: "冷静克制，句式完整，用词正式，不轻易感叹，多用句号，自称'我'"
  真宵: "活泼轻快，尾音上扬（呀、哦、嘛），带可爱感，自称'我'，偶尔卖萌"
  裁判長: "威严但公正，句式正式，用'本庭'自称，使用感叹号时克制"
  星影: "年长律师语气，沉稳老练，偶尔带点不耐烦，自称'我'"

# Scene modes for context injection
scene_modes:
  courtroom: "法庭辩论场景。保持紧迫感和对抗张力，句子短而有力，多用感叹号和反问。成步堂正在质证或反驳。"
  investigation: "调查取证场景。语气平和，描述性文字完整翻译。成步堂在收集线索。"
  daily: "日常对话场景。语气轻松自然，可以保留调侃和幽默感。"

glossary:
  # 法律术语
  法廷: 法庭
  裁判長: 审判长
  検察官: 检察官
  弁護士: 律师
  被告人: 被告
  証人: 证人
  陪審員: 陪审员
  証拠: 证据
  証言: 证言
  尋問: 询问
  反対尋問: 反询问
  異議: 异议
  判決: 判决
  有罪: 有罪
  無罪: 无罪
  エピソード: 章节
  選んでください: 请选择
  初めての逆転: 初次逆转
  # 角色名
  成歩堂龍一: 成步堂龙一
  御劍怜侍: 御剑怜侍
  綾里真宵: 绫里真宵
  綾里千尋: 绫里千寻
  糸鋸圭介: 糸锯圭介
  狩魔冥: 狩魔冥
  矢張政志: 矢张政志
  星影: 星影
  星影龍: 星影龙

