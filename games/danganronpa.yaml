# 场景模式 / Scene Modes
# ═══════════════════════════════════════════════════════
scene_modes:
  daily: "校园日常场景。语气自然平和，角色对话展现性格特点，可以保留调侃、轻松和日常感。角色之间的互动和对话为主。"
  investigation: "调查取证场景。语气转为严肃和聚焦，苗木正在收集线索和证据。描述性文字需完整准确翻译，保留悬疑感和紧迫感。"
  trial: "学级裁判场景。关键辩论阶段！保持高度紧张和对抗感，句子短促有力，节奏快。苗木正在用言弹（コトダマ）击破对手发言中的矛盾。反论、论破等瞬间要保留爆发力。"
  execution: "处刑场景。极其残忍和绝望的氛围，黑白熊的台词充满讽刺和戏谑，语气残酷而恶搞。"
  climax: "高潮推理场景。苗木正在重组整个案件全貌，语气自信、推理逻辑清晰，逐步揭露真相。"
  ending: "结局场景。情感充沛，根据结局走向（希望或绝望）调整语气基调，保留角色内心独白的深度。"

